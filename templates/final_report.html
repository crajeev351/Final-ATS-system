<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Score Card | ATS.AI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .report-container {
            max-width: 1000px;
            margin: 3rem auto;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .hero-section {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 3rem;
            align-items: center;
            margin-bottom: 4rem;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 1.5rem;
            border: 1px solid var(--border);
        }

        .score-gauge-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto;
        }

        .score-value {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .verdict-badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .badge-high { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
        .badge-mid { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.2); }
        .badge-low { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }

        .quick-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .stat-card {
            background: var(--bg-dark);
            padding: 1.5rem;
            border-radius: 1rem;
            text-align: center;
            border: 1px solid var(--border);
        }

        .stat-card .label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: uppercase; font-weight: 600; }
        .stat-card .value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }

        .card {
            background: rgba(255, 255, 255, 0.02);
            padding: 2rem;
            border-radius: 1.5rem;
            border: 1px solid var(--border);
            margin-bottom: 2rem;
        }

        .qa-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 0.75rem;
        }

        .qa-table th {
            text-align: left;
            padding: 1rem;
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 600;
        }

        .qa-table td {
            padding: 1.25rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .qa-table td:first-child { border-left: 1px solid var(--border); border-top-left-radius: 1rem; border-bottom-left-radius: 1rem; }
        .qa-table td:last-child { border-right: 1px solid var(--border); border-top-right-radius: 1rem; border-bottom-right-radius: 1rem; }

        .score-pill {
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.8125rem;
            font-weight: 700;
        }

        .pill-green { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .pill-yellow { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .pill-red { background: rgba(239, 68, 68, 0.1); color: #ef4444; }

        .btn-back {
            display: block;
            width: fit-content;
            margin: 3rem auto 0;
            padding: 1rem 2rem;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 0.75rem;
            font-weight: 700;
            transition: all 0.2s;
        }

        .btn-back:hover { background: var(--primary-hover); transform: translateY(-2px); }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/dashboard" class="logo">ATS.AI</a>
    </nav>

    <div class="report-container">
        <div class="header" style="text-align: center; margin-bottom: 3rem;">
            <h1 class="title">Interview Performance</h1>
            <p class="subtitle">AI-generated comprehensive assessment</p>
        </div>

        <div class="hero-section">
            <div class="score-gauge-container">
                <canvas id="scoreChart"></canvas>
                <div class="score-value" id="overallScore">0/10</div>
            </div>
            <div style="text-align: center;">
                <div id="verdictBadge" class="verdict-badge">Analyzing...</div>
                <div class="quick-stats">
                    <div class="stat-card">
                        <div class="label">Technical</div>
                        <div class="value" id="techScore">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Communication</div>
                        <div class="value" id="commScore">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Confidence</div>
                        <div class="value" id="confScore">0</div>
                    </div>
                </div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem;">
            <div class="card">
                <h3 style="margin-top: 0; font-size: 1.125rem;">🧠 Behavioral Analysis</h3>
                <p id="behavioralText" style="color: var(--text-muted); line-height: 1.6; font-size: 0.9375rem;">Loading...</p>
            </div>
            <div class="card">
                <h3 style="margin-top: 0; font-size: 1.125rem;">🛡️ Integrity Check</h3>
                <p id="integrityText" style="color: var(--text-muted); line-height: 1.6; font-size: 0.9375rem;">Loading...</p>
            </div>
        </div>

        <div class="card" style="background: none; border: none; padding: 0;">
            <h3 style="font-size: 1.125rem;">📝 Question Breakdown</h3>
            <table class="qa-table">
                <thead>
                    <tr>
                        <th style="width: 35%;">Question</th>
                        <th style="width: 45%;">Response</th>
                        <th style="width: 20%;">Score</th>
                    </tr>
                </thead>
                <tbody id="qa-body"></tbody>
            </table>
        </div>

        <a href="/dashboard" class="btn-back">← Return to Dashboard</a>
    </div>

<script id="result-data" type="application/json">
    {{ result | tojson | safe }}
</script>

<script>
    const rawData = document.getElementById("result-data").textContent;
    let data;
    try {
        data = JSON.parse(rawData);
    } catch (e) {
        data = {};
    }

    function initReport() {
        if (!data || Object.keys(data).length === 0) return;

        const overall = data.overall_score || 0;
        document.getElementById("overallScore").innerText = overall + "/10";

        const badge = document.getElementById("verdictBadge");
        badge.innerText = data.final_verdict || "Average";
        if (overall >= 8) badge.className = "verdict-badge badge-high";
        else if (overall >= 5) badge.className = "verdict-badge badge-mid";
        else badge.className = "verdict-badge badge-low";

        document.getElementById("techScore").innerText = data.metrics?.tech || 0;
        document.getElementById("commScore").innerText = data.metrics?.comm || 0;
        document.getElementById("confScore").innerText = data.metrics?.conf || 0;

        new Chart(document.getElementById("scoreChart"), {
            type: "doughnut",
            data: {
                datasets: [{
                    data: [overall, 10 - overall],
                    backgroundColor: ['#4f46e5', '#334155'],
                    borderWidth: 0
                }]
            },
            options: {
                cutout: '80%',
                plugins: { tooltip: { enabled: false }, legend: { display: false } }
            }
        });

        document.getElementById("behavioralText").innerText = data.behavioral_analysis?.observations || "Analysis pending.";
        
        const risk = data.behavioral_analysis?.cheating_risk || "Low";
        document.getElementById("integrityText").innerHTML = `
            <strong>Risk:</strong> ${risk}<br>
            Candidate demonstrated focus and consistent camera engagement.
        `;

        const qaBody = document.getElementById("qa-body");
        (data.qa_analysis || []).forEach(item => {
            const row = document.createElement("tr");
            const s = item.score || 0;
            let pCls = "pill-red";
            if (s >= 8) pCls = "pill-green";
            else if (s >= 5) pCls = "pill-yellow";

            row.innerHTML = `
                <td><div style="font-weight:600; font-size:0.875rem">${item.question}</div></td>
                <td><div style="font-size:0.875rem; color:var(--text-muted)">${item.answer}</div></td>
                <td><span class="score-pill ${pCls}">${s}/10</span></td>
            `;
            qaBody.appendChild(row);
        });
    }

    window.onload = initReport;
</script>

</body>
</html>
