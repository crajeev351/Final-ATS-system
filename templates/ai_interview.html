<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mock Interview | ATS.AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .interview-container {
            max-width: 900px;
            margin: 2rem auto;
            position: relative;
        }
        
        #start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-card);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 3rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
        }

        #progress-bar-container {
            width: 100%;
            background: var(--bg-input);
            border-radius: 1rem;
            margin-bottom: 2.5rem;
            height: 8px;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--primary);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #video-container {
            position: relative;
            margin: 2rem 0;
            display: flex;
            justify-content: center;
        }

        video {
            border-radius: var(--radius-md);
            border: 2px solid var(--border);
            width: 100%;
            max-width: 480px;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #face-status {
            position: absolute;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            padding: 0.5rem 1.25rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid var(--border);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        #speaking-indicator {
            position: absolute;
            bottom: 1.5rem;
            right: calc(50% - 220px);
            width: 14px;
            height: 14px;
            background: var(--success);
            border-radius: 50%;
            display: none;
            box-shadow: 0 0 15px var(--success);
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.6); opacity: 1; }
            100% { transform: scale(1); opacity: 0.6; }
        }

        .speaking { animation: pulse 1s infinite; display: block !important; }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        #question {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
            text-align: center;
            min-height: 4.5rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/dashboard" class="logo">ATS<span>.AI</span></a>
    </nav>

    <main class="container-full interview-container">
        <div class="card" style="padding: 3rem;">
            <!-- Start Interview Overlay -->
            <div id="start-overlay">
                <div style="font-size: 3.5rem; margin-bottom: 2rem;">🎙️</div>
                <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 0.75rem;">AI Interview Ready</h2>
                <p style="color: var(--text-muted); max-width: 400px; margin: 0 auto 2.5rem; font-size: 1.1rem;">Position yourself in front of the camera and ensure your environment is quiet.</p>
                <button onclick="beginInterview()" class="btn btn-primary" style="padding: 1rem 3rem; font-size: 1.1rem;">
                    🚀 Start Session
                </button>
            </div>

            <div id="progress-bar-container">
                <div id="progress-bar"></div>
            </div>

            <div id="question">
                Initialising AI interviewer environment...
            </div>

            <div id="video-container">
                <video id="video" autoplay muted></video>
                <div id="face-status">Checking Hardware...</div>
                <div id="speaking-indicator"></div>
            </div>

            <textarea id="answer" placeholder="Your response will appear here as you speak..." style="min-height: 120px;"></textarea>

            <div class="btn-group">
                <button onclick="repeatQuestion()" class="btn btn-ghost">🔊 Repeat</button>
                <button onclick="toggleListening()" id="mic-btn" class="btn btn-primary" style="background: var(--accent);">🎙 Speak</button>
                <button onclick="submitAnswer()" id="submit-btn" class="btn btn-primary">Next →</button>
            </div>

            <div id="score-container" style="display: none; text-align: center; margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border);">
                <button onclick="viewScoreCard()" id="view-score-btn" class="btn btn-primary" style="width: 100%; height: 60px; font-size: 1.1rem;">
                    📊 Generate Detailed Performance Report
                </button>
                <p id="saving-msg" style="margin-top: 1rem; color: var(--text-muted); font-size: 0.9rem; font-weight: 500;">AI is calculating your confidence and technical scores...</p>
            </div>
        </div>
    </main>

    <!-- MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

    <!-- TensorFlow.js & Object Detection -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <script>
        let questions = [];
        let currentQuestionIndex = 0;
        let voices = [];
        let allAnswers = [];
        let faceScore = { 
            stability: 0, 
            movement: 0, 
            frames: 0,
            mouthOpening: 0,
            smileScore: 0,
            blinkCount: 0,
            gazeCenter: 0,
            postureScore: 0 
        };
        let cheatingFlags = { 
            noFace: 0, 
            multipleFaces: 0, 
            lookingAway: 0,
            readingDetection: 0,
            phoneDetected: 0,
            bookDetected: 0,
            extraPersons: 0
        };
        let eyeClosed = false;
        let lastGazeX = 0.5;
        let objectDetector;

        // Load COCO-SSD Model
        cocoSsd.load().then(model => {
            objectDetector = model;
            console.log("Object Detection Model Loaded");
        });

        function scanForObjects() {
            if (objectDetector && videoElement.readyState === 4) {
                objectDetector.detect(videoElement).then(predictions => {
                    let personCount = 0;
                    predictions.forEach(pred => {
                        if (pred.class === "cell phone" && pred.score > 0.6) {
                            cheatingFlags.phoneDetected++;
                            document.getElementById("face-status").innerText = "Phone Detected!";
                            document.getElementById("face-status").style.color = "var(--danger)";
                        }
                        if (pred.class === "book" && pred.score > 0.6) {
                            cheatingFlags.bookDetected++;
                            document.getElementById("face-status").innerText = "Book Detected!";
                            document.getElementById("face-status").style.color = "var(--danger)";
                        }
                        if (pred.class === "person") personCount++;
                    });
                    if (personCount > 1) cheatingFlags.extraPersons++;
                });
            }
            setTimeout(scanForObjects, 2000); // Scan every 2 seconds to maintain performance
        }
        scanForObjects();

        function loadVoices() { voices = window.speechSynthesis.getVoices(); }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        fetch("/get-all-questions").then(res => res.json()).then(data => {
            questions = data.questions;
            if (questions.length > 0) document.getElementById("question").innerText = "Everything looks good. Click 'Start Session' when ready.";
            else document.getElementById("question").innerText = "Error: No questions loaded. Please return to dashboard.";
        });

        function beginInterview() {
            document.getElementById("start-overlay").style.display = "none";
            if (questions.length > 0) {
                let firstQ = "Hello. Let's begin the interview. " + questions[0];
                document.getElementById("question").innerText = questions[0];
                speak(firstQ);
            }
        }

        const videoElement = document.getElementById("video");
        navigator.mediaDevices.getUserMedia({ video: true }).then(stream => { videoElement.srcObject = stream; });

        const faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

        let lastFaceCenter = { x: 0, y: 0 };
        faceMesh.onResults(results => {
            const statusEl = document.getElementById("face-status");
            if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
                statusEl.innerText = "No Face Detected"; statusEl.style.color = "var(--danger)"; cheatingFlags.noFace++;
            } else if (results.multiFaceLandmarks.length > 1) {
                statusEl.innerText = "Multiple Faces"; statusEl.style.color = "var(--danger)"; cheatingFlags.multipleFaces++;
            } else {
                statusEl.innerText = "Assessment Active"; statusEl.style.color = "var(--success)";
                const landmarks = results.multiFaceLandmarks[0];
                faceScore.frames++;

                const nose = landmarks[1];
                const dist = Math.sqrt(Math.pow(nose.x - lastFaceCenter.x, 2) + Math.pow(nose.y - lastFaceCenter.y, 2));
                if (dist < 0.02) faceScore.stability++;
                lastFaceCenter = nose;

                const leftIris = landmarks[468];
                const rightIris = landmarks[473];
                const gazeX = (leftIris.x + rightIris.x) / 2;
                if (Math.abs(gazeX - lastGazeX) > 0.01) {
                    faceScore.gazeCenter++;
                    if (dist < 0.005 && Math.abs(gazeX - lastGazeX) > 0.02) cheatingFlags.readingDetection++;
                }
                lastGazeX = gazeX;

                const leftUpperLid = landmarks[159];
                const leftLowerLid = landmarks[145];
                const eyeDist = Math.abs(leftUpperLid.y - leftLowerLid.y);
                if (eyeDist < 0.015 && !eyeClosed) { eyeClosed = true; faceScore.blinkCount++; }
                else if (eyeDist > 0.02) { eyeClosed = false; }

                const topLip = landmarks[13];
                const bottomLip = landmarks[14];
                faceScore.mouthOpening += Math.abs(topLip.y - bottomLip.y);

                const mouthWidth = Math.abs(landmarks[61].x - landmarks[291].x);
                if (mouthWidth > 0.15) faceScore.smileScore++;

                const midEyeX = (landmarks[33].x + landmarks[263].x) / 2;
                if (Math.abs(nose.x - midEyeX) > 0.06) cheatingFlags.lookingAway++;
            }
        });

        new Camera(videoElement, { onFrame: async () => { await faceMesh.send({ image: videoElement }); }, width: 640, height: 480 }).start();

        function speak(text) {
            window.speechSynthesis.cancel();
            let speech = new SpeechSynthesisUtterance(text);
            speech.lang = "en-US"; speech.rate = 0.95;
            const indicator = document.getElementById("speaking-indicator");
            speech.onstart = () => { indicator.classList.add("speaking"); };
            speech.onend = () => { indicator.classList.remove("speaking"); };
            if (voices.length === 0) voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v => v.name.includes("Google US English") || v.name.includes("David"));
            if (preferredVoice) speech.voice = preferredVoice;
            window.speechSynthesis.speak(speech);
        }

        function repeatQuestion() { speak(questions[currentQuestionIndex]); }

        function startListening() {
            const micBtn = document.getElementById("mic-btn");
            const answerEl = document.getElementById("answer");
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.continuous = true; recognition.interimResults = true; recognition.lang = "en-US";
            recognition.onstart = () => { micBtn.innerText = "🛑 STOP"; micBtn.style.background = "var(--danger)"; };
            recognition.onresult = (event) => {
                let finalTranscript = "";
                for (let i = event.resultIndex; i < event.results.length; ++i) if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
                if (finalTranscript) answerEl.value += (answerEl.value ? " " : "") + finalTranscript;
            };
            recognition.onend = () => { stopListening(); };
            recognition.start(); window.currentRecognition = recognition;
        }

        function stopListening() {
            const micBtn = document.getElementById("mic-btn");
            if (window.currentRecognition) { window.currentRecognition.stop(); window.currentRecognition = null; }
            micBtn.innerText = "🎙 SPEAK"; micBtn.style.background = "var(--accent)";
        }

        function toggleListening() { if (window.currentRecognition) stopListening(); else startListening(); }

        function submitAnswer() {
            const answer = document.getElementById("answer").value;
            if (!answer) { alert("Please provide an answer first."); return; }
            stopListening();
            allAnswers.push(answer);
            document.getElementById("progress-bar").style.width = ((currentQuestionIndex + 1) / questions.length) * 100 + "%";
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                const nextQ = questions[currentQuestionIndex];
                document.getElementById("question").style.opacity = 0;
                setTimeout(() => {
                    document.getElementById("question").innerText = nextQ;
                    document.getElementById("question").style.opacity = 1;
                    speak(nextQ);
                }, 300);
                document.getElementById("answer").value = "";
            } else { finishInterview(); }
        }

        function finishInterview() {
            document.getElementById("question").innerText = "Interview Complete";
            speak("Thank you for your time. Your report is being generated.");
            document.getElementById("submit-btn").style.display = "none";
            document.getElementById("mic-btn").style.display = "none";
            document.getElementById("score-container").style.display = "block";
            document.getElementById("view-score-btn").disabled = true; document.getElementById("view-score-btn").style.opacity = "0.5";
            fetch("/final-evaluation", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ answers: allAnswers, face: faceScore, cheating: cheatingFlags }) })
            .then(res => res.json()).then(data => {
                window.finalResult = data;
                return fetch("/show-final-report", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data) });
            }).then(() => {
                document.getElementById("view-score-btn").disabled = false; document.getElementById("view-score-btn").style.opacity = "1";
                document.getElementById("saving-msg").innerText = "Analysis Complete!";
            });
        }
        function viewScoreCard() { window.location.href = "/final-report"; }
    </script>
</body>
</html>
