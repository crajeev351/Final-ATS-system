<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mock Interview | ATS.AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .container { position: relative; overflow: hidden; }
        
        #start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--card-bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            box-sizing: border-box;
        }

        #progress-bar-container {
            width: 100%;
            background: var(--bg-dark);
            border-radius: 1rem;
            margin-bottom: 2rem;
            height: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        #video-container {
            position: relative;
            margin: 2rem 0;
            display: flex;
            justify-content: center;
        }

        video {
            border-radius: 1rem;
            border: 2px solid var(--border);
            width: 100%;
            max-width: 400px;
            background: #000;
        }

        #face-status {
            position: absolute;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid var(--border);
        }

        #speaking-indicator {
            position: absolute;
            bottom: 1rem;
            right: calc(50% - 190px);
            width: 12px;
            height: 12px;
            background: #10b981;
            border-radius: 50%;
            display: none;
            box-shadow: 0 0 15px #10b981;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.5); opacity: 1; }
            100% { transform: scale(1); opacity: 0.5; }
        }

        .speaking { animation: pulse 1s infinite; display: block !important; }

        textarea { margin-top: 1rem; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/dashboard" class="logo">ATS.AI</a>
    </nav>

    <div class="container">
        <h2 class="title">AI Mock Interview</h2>
        <p class="subtitle">Focus on the camera and speak clearly</p>

        <!-- Start Interview Overlay -->
        <div id="start-overlay">
            <div style="font-size: 3rem; margin-bottom: 1.5rem;">🎤</div>
            <h3 class="title" style="font-size: 1.5rem;">Ready to Begin?</h3>
            <p class="subtitle" style="max-width: 300px; margin: 0 auto 2rem;">Ensure your microphone and camera are active. We will evaluate your technical depth and confidence.</p>
            <button onclick="beginInterview()" class="btn-primary" style="width: auto; padding-left: 3rem; padding-right: 3rem;">
                🚀 Start Session
            </button>
        </div>

        <div id="progress-bar-container">
            <div id="progress-bar"></div>
        </div>

        <p id="question" style="font-size: 1.125rem; font-weight: 600; min-height: 4em; color: var(--text-main); line-height: 1.5; text-align: center; padding: 0 1rem;">
            Initialising AI interviewer...
        </p>

        <div id="video-container">
            <video id="video" autoplay muted></video>
            <div id="face-status">Checking Camera...</div>
            <div id="speaking-indicator"></div>
        </div>

        <textarea id="answer" placeholder="Click '🎙 Click to Speak' or type your answer directly here..." style="width: 100%; margin-top: 20px; height: 120px; border-radius: 10px; border: 1px solid var(--border); padding: 15px; font-family: inherit; background: var(--bg-dark); color: var(--text-main); line-height: 1.6;"></textarea>

        <div class="button-grid" style="grid-template-columns: 1fr 2fr 1fr;">
            <button onclick="repeatQuestion()" class="btn-secondary">🔊 Repeat</button>
            <button onclick="toggleListening()" id="mic-btn" class="btn-primary" style="background: var(--accent);">🎙 Click to Speak</button>
            <button onclick="submitAnswer()" id="submit-btn" class="btn-primary">Next →</button>
        </div>

        <div id="score-container" style="display: none; text-align: center; margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border);">
            <button onclick="viewScoreCard()" id="view-score-btn" class="btn-primary" style="width: 100%;">
                📊 Generate Performance Report
            </button>
            <p id="saving-msg" style="margin-top: 1rem; color: var(--text-muted); font-size: 0.875rem;">Generating metrics...</p>
        </div>
    </div>

    <!-- MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

    <script>
        let questions = [];
        let currentQuestionIndex = 0;
        let voices = [];
        let allAnswers = [];
        let faceScore = { 
            stability: 0, 
            movement: 0, 
            frames: 0,
            mouthOpening: 0,
            smileScore: 0,
            blinkCount: 0,
            gazeCenter: 0,
            postureScore: 0 
        };
        let cheatingFlags = { 
            noFace: 0, 
            multipleFaces: 0, 
            lookingAway: 0,
            readingDetection: 0 
        };
        let eyeClosed = false;
        let lastGazeX = 0.5;

        function loadVoices() { voices = window.speechSynthesis.getVoices(); }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        fetch("/get-all-questions").then(res => res.json()).then(data => {
            questions = data.questions;
            if (questions.length > 0) document.getElementById("question").innerText = "Camera Ready. Start the session when you are comfortable.";
            else document.getElementById("question").innerText = "No questions found. Please return to dashboard.";
        });

        function beginInterview() {
            document.getElementById("start-overlay").style.display = "none";
            if (questions.length > 0) {
                let firstQ = "Welcome to your AI assessment. Let's start with the first question. " + questions[0];
                document.getElementById("question").innerText = questions[0];
                speak(firstQ);
            }
        }

        const videoElement = document.getElementById("video");
        navigator.mediaDevices.getUserMedia({ video: true }).then(stream => { videoElement.srcObject = stream; });

        const faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

        let lastFaceCenter = { x: 0, y: 0 };
        faceMesh.onResults(results => {
            const statusEl = document.getElementById("face-status");
            if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
                statusEl.innerText = "❌ No Face Detected"; statusEl.style.color = "#ef4444"; cheatingFlags.noFace++;
            } else if (results.multiFaceLandmarks.length > 1) {
                statusEl.innerText = "⚠️ Multiple Faces"; statusEl.style.color = "#f59e0b"; cheatingFlags.multipleFaces++;
            } else {
                statusEl.innerText = "✅ Monitoring Active"; statusEl.style.color = "#10b981";
                const landmarks = results.multiFaceLandmarks[0];
                faceScore.frames++;

                // 1. Posture & Stability
                const nose = landmarks[1];
                const dist = Math.sqrt(Math.pow(nose.x - lastFaceCenter.x, 2) + Math.pow(nose.y - lastFaceCenter.y, 2));
                if (dist < 0.02) faceScore.stability++;
                lastFaceCenter = nose;

                // 2. Iris Gaze Tracking (Detects Reading)
                const leftIris = landmarks[468];
                const rightIris = landmarks[473];
                const gazeX = (leftIris.x + rightIris.x) / 2;
                
                if (Math.abs(gazeX - lastGazeX) > 0.01) {
                    faceScore.gazeCenter++;
                    if (dist < 0.005 && Math.abs(gazeX - lastGazeX) > 0.02) {
                        cheatingFlags.readingDetection++;
                    }
                }
                lastGazeX = gazeX;

                // 3. Blink Detection (Simplified EAR)
                const leftUpperLid = landmarks[159];
                const leftLowerLid = landmarks[145];
                const eyeDist = Math.abs(leftUpperLid.y - leftLowerLid.y);
                
                if (eyeDist < 0.015 && !eyeClosed) {
                    eyeClosed = true;
                    faceScore.blinkCount++;
                } else if (eyeDist > 0.02) {
                    eyeClosed = false;
                }

                // 4. Mouth Articulation
                const topLip = landmarks[13];
                const bottomLip = landmarks[14];
                faceScore.mouthOpening += Math.abs(topLip.y - bottomLip.y);

                // 5. Smile/Engagement
                const mouthWidth = Math.abs(landmarks[61].x - landmarks[291].x);
                if (mouthWidth > 0.15) faceScore.smileScore++;

                // 6. Head Pose (Looking Away)
                const midEyeX = (landmarks[33].x + landmarks[263].x) / 2;
                if (Math.abs(nose.x - midEyeX) > 0.06) cheatingFlags.lookingAway++;
            }
        });

        new Camera(videoElement, { onFrame: async () => { await faceMesh.send({ image: videoElement }); }, width: 640, height: 480 }).start();

        function speak(text) {
            window.speechSynthesis.cancel();
            let speech = new SpeechSynthesisUtterance(text);
            speech.lang = "en-US"; speech.rate = 0.95;
            const indicator = document.getElementById("speaking-indicator");
            speech.onstart = () => { indicator.classList.add("speaking"); };
            speech.onend = () => { indicator.classList.remove("speaking"); };
            if (voices.length === 0) voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v => v.name.includes("Google US English") || v.name.includes("David") || v.name.includes("English United States"));
            if (preferredVoice) speech.voice = preferredVoice;
            window.speechSynthesis.speak(speech);
        }

        function repeatQuestion() { speak(questions[currentQuestionIndex]); }

        function startListening() {
            const micBtn = document.getElementById("mic-btn");
            const answerEl = document.getElementById("answer");
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.continuous = true; recognition.interimResults = true; recognition.lang = "en-US";
            recognition.onstart = () => { micBtn.innerText = "🛑 Stop Recording"; micBtn.style.background = "#ef4444"; };
            recognition.onresult = (event) => {
                let finalTranscript = "";
                for (let i = event.resultIndex; i < event.results.length; ++i) if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
                if (finalTranscript) answerEl.value += (answerEl.value ? " " : "") + finalTranscript;
            };
            recognition.onend = () => { stopListening(); };
            recognition.start(); window.currentRecognition = recognition;
        }

        function stopListening() {
            const micBtn = document.getElementById("mic-btn");
            if (window.currentRecognition) { window.currentRecognition.stop(); window.currentRecognition = null; }
            micBtn.innerText = "🎙 Click to Speak"; micBtn.style.background = "var(--accent)";
        }

        function toggleListening() { if (window.currentRecognition) stopListening(); else startListening(); }

        function submitAnswer() {
            const answer = document.getElementById("answer").value;
            if (!answer) { alert("Please provide an answer first."); return; }
            
            stopListening();
            allAnswers.push(answer);
            
            document.getElementById("progress-bar").style.width = ((currentQuestionIndex + 1) / questions.length) * 100 + "%";
            currentQuestionIndex++;

            // REMOVED individual answer evaluation to save API quota
            
            if (currentQuestionIndex < questions.length) {
                const nextQ = questions[currentQuestionIndex];
                const transitions = ["Excellent. ", "Moving on. ", "Next question. ", "I see. "];
                
                document.getElementById("question").style.opacity = 0;
                setTimeout(() => {
                    document.getElementById("question").innerText = nextQ;
                    document.getElementById("question").style.opacity = 1;
                    speak(transitions[Math.floor(Math.random() * transitions.length)] + nextQ);
                }, 300);
                document.getElementById("answer").value = "";
            } else {
                finishInterview();
            }
        }

        function finishInterview() {
            document.getElementById("question").innerText = "Assessment Concluded";
            speak("Thank you. I am processing your performance metrics now.");
            document.getElementById("submit-btn").style.display = "none";
            document.getElementById("mic-btn").style.display = "none";
            document.getElementById("score-container").style.display = "block";
            document.getElementById("view-score-btn").disabled = true; document.getElementById("view-score-btn").style.opacity = "0.5";
            fetch("/final-evaluation", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ answers: allAnswers, face: faceScore, cheating: cheatingFlags }) })
            .then(res => res.json()).then(data => {
                window.finalResult = data;
                return fetch("/show-final-report", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data) });
            }).then(() => {
                document.getElementById("view-score-btn").disabled = false; document.getElementById("view-score-btn").style.opacity = "1";
                document.getElementById("saving-msg").innerText = "Analysis Complete!";
            });
        }

        function viewScoreCard() { window.location.href = "/final-report"; }
    </script>
</body>
</html>
