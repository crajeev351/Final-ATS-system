<!DOCTYPE html>
<html>
<head>
    <title>ATS Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>
<body>

<div class="container">

    <a href="/logout" class="logout">Logout</a>

    <h2 class="title">🚀 ATS Intelligence Dashboard</h2>

    <div class="user-info">
        Logged in as: <b>{{ session['user'] }}</b>
    </div>

    <form method="POST" enctype="multipart/form-data">


        <label>Paste Job Description</label>
        <textarea name="job_desc" placeholder="Paste job description here..."></textarea>

        <label>Upload Resume (PDF only)</label>
        <input type="file" name="resume">

        <button type="submit">⚡ Generate ATS Score</button>
        <button formaction="/generate-questions" formmethod="post">
        🧠 Generate Interview Questions
        </button>
    </form>

</div>

</body>
</html>
