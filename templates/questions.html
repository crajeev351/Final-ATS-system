<!DOCTYPE html>
<html>
<head>
    <title>AI Questions</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='result.css') }}">

    <style>
        .questions-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }

        .question-card {
            padding: 20px;
            border-radius: 15px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0,255,255,0.2);
            transition: 0.3s;
            cursor: pointer;
        }

        .question-card:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px #00eaff;
        }

        .question-title {
            color: #00eaff;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .question-text {
            color: #e0e0e0;
        }
    </style>

</head>
<body>

<div class="report-container">

    <h2>🧠 AI Interview Questions</h2>

    <div class="questions-container">

        {% for q in questions %}
        <div class="question-card">
            <div class="question-title">Question {{ loop.index }}</div>
            <div class="question-text">{{ q }}</div>
        </div>
        {% endfor %}

    </div>

    <div style="text-align:center; margin-top:30px;">
        <a href="/ai-interview">
            <button class="btn">Start Mock Interview →</button>
        </a>
    </div>

</div>

</body>
</html>
