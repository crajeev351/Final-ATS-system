<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Questions | ATS.AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='result.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .question-card {
            margin-bottom: 1.25rem;
            transition: transform 0.2s;
            cursor: default;
        }
        .question-card:hover {
            transform: translateX(5px);
            border-color: var(--primary);
        }
        .question-header {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        .question-text {
            font-size: 1.1rem;
            font-weight: 500;
            line-height: 1.5;
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/dashboard" class="logo">ATS<span>.AI</span></a>
        <div class="nav-links">
            <a href="/dashboard" class="btn btn-ghost" style="padding: 0.5rem 1rem; font-size: 0.8rem;">← Dashboard</a>
        </div>
    </nav>

    <main class="container-full" style="max-width: 800px; padding-top: 3rem; padding-bottom: 5rem;">
        <header style="margin-bottom: 3rem; text-align: center;">
            <h1 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem;">AI Interview Prep</h1>
            <p style="color: var(--text-muted);">Customized questions generated from your professional background.</p>
        </header>

        <div class="questions-list">
            {% for q in questions %}
            <div class="card question-card">
                <div class="question-header">Question {{ loop.index }}</div>
                <div class="question-text">{{ q }}</div>
            </div>
            {% endfor %}
        </div>

        <div style="margin-top: 4rem; text-align: center;">
            <a href="/ai-interview" class="btn btn-primary" style="padding: 1rem 2.5rem; font-size: 1.1rem;">
                🚀 Start Interactive Mock Interview
            </a>
            <p style="color: var(--text-muted); font-size: 0.875rem; margin-top: 1.5rem;">The mock interview includes real-time behavioral analysis.</p>
        </div>
    </main>

</body>
</html>
